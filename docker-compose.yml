services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api-prod-local:latest
    container_name: new-api-prod-app
    restart: unless-stopped
    command: --port 3001 --log-dir /app/logs
    network_mode: host
    volumes:
      - ./.runtime/prod/data:/data
      - ./.runtime/prod/logs:/app/logs
    env_file:
      - ./.runtime/prod/.env
    environment:
      SQL_DSN: postgresql://root:${POSTGRES_PASSWORD}@127.0.0.1:5432/new-api?sslmode=disable
      REDIS_CONN_STRING: redis://127.0.0.1:6379/0
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./.runtime/prod/redis:/data
    network_mode: host

  postgres:
    image: postgres:16-alpine
    container_name: new-api-postgres
    restart: unless-stopped
    env_file:
      - ./.runtime/prod/.env
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: new-api
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./.runtime/prod/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    network_mode: host
